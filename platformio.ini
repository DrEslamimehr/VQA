; QA-TM wearable node -- PlatformIO build configuration.
; Alternatively, open src/main.cpp in Arduino IDE v2.3 (per the paper's
; reproducibility procedure, step 1) and install the TFLite Micro library.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DQATM_SAMPLE_RATE_HZ=700        ; ECG node; use 64 for the PPG node
lib_deps =
    ; TensorFlow Lite for Microcontrollers (Table 1: TFLite Micro v2.14)
    tanakamasayuki/TensorFlowLite_ESP32 @ ^2.0.0
